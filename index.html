<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/frettrack-emblem.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/release-icons/frettrack-release-icon-2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1115" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FretTrack" />
    <title>FretTrack Systems</title>
  </head>
  <body>
    <noscript>
      <main style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px;">
        <h1>FretTrack</h1>
        <p>JavaScript is required to run FretTrack.</p>
      </main>
    </noscript>
    <div id="legacy-browser-message" style="display: none; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px;">
      <h1>FretTrack</h1>
      <p>This iPad/browser is too old for this version of FretTrack. Try Safari on a newer iOS/iPadOS device or desktop.</p>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var supported = Boolean(
          window.Promise &&
          window.fetch &&
          window.Symbol &&
          window.WeakMap &&
          window.Map &&
          Array.from &&
          Object.assign &&
          document.querySelector
        );

        if (!supported) {
          var fallback = document.getElementById('legacy-browser-message');
          var root = document.getElementById('root');
          if (fallback) fallback.style.display = 'block';
          if (root) root.style.display = 'none';
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
